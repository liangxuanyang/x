    vite-plugin-vue-resolve-types: ^0.0.1
    vitest: ^4.0.18
    vue-tsc: ^3.2.5
  docs:
    "@antdv-next/unocss": ^1.0.2
    "@mdit-vue/plugin-frontmatter": ^2.1.4
    "@mdit-vue/plugin-headers": ^2.1.4
    "@mdit-vue/plugin-title": ^2.1.4
    "@mdit-vue/plugin-toc": ^2.1.4
    "@mdit-vue/shared": ^2.1.4
    "@mdit-vue/types": ^2.1.4
    "@shikijs/markdown-it": ^3.13.0
    "@shikijs/transformers": ^3.13.0
    markdown-it: ^14.1.0
    markdown-it-anchor: ^9.2.0
    markdown-it-async: ^2.2.0
    markdown-it-attrs: ^4.3.1
    markdown-it-container: ^4.0.0

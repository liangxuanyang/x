    "@vueuse/core": ^14.2.1
    antdv-next: ^1.1.2
    dayjs: ^1.11.19
    lru-cache: ^11.2.2
    mlly: ^1.8.0
    nanoid: ^5.1.6
    pathe: ^2.0.3
    picomatch: ^4.0.3
    pinia: ^3.0.4
    vue: ^3.5.29
    vue-i18n: ^11.2.8
    vue-router: ^5.0.3
  types:
